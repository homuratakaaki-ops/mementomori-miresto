<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スピード・行動順計算ツール｜メメントモリ攻略</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8aa64;
    --gold-dim: rgba(200,170,100,0.24);
    --gold-bg: rgba(200,170,100,0.1);
    --bg: #0d0a14;
    --bg2: #1a1025;
    --card: rgba(255,255,255,0.04);
    --text: #e8d9c0;
    --text-dim: #a08060;
    --text-dark: #604030;
    --blue: #83a2ff;
    --red: #e07070;
    --border: rgba(200,170,100,0.25);
  }

  body {
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 24px 14px 40px;
  }

  .container { max-width: 1120px; margin: 0 auto; }
  .site-nav { margin-bottom: 18px; }
  .site-nav.bottom { margin: 18px 0 0; text-align: center; }
  .site-back {
    display: inline-flex; align-items: center; gap: 6px; color: var(--gold);
    font-size: 13px; font-weight: 700; text-decoration: none;
  }
  .site-back:hover { text-decoration: underline; }

  .header { text-align: center; margin-bottom: 24px; }
  .header-sub {
    font-size: 11px; letter-spacing: 4px; color: var(--gold); margin-bottom: 6px;
    text-transform: uppercase; font-family: 'Noto Serif JP', serif;
  }
  .header h1 {
    font-size: clamp(21px, 4vw, 32px); font-weight: 700; color: #f0e0c0;
    font-family: 'Noto Serif JP', serif; line-height: 1.4;
  }
  .header-line {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 10px auto 0;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .section-title {
    font-size: 12px; letter-spacing: 2px; color: var(--gold);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Serif JP', serif; font-weight: 700;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--gold-dim); }

  label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
  select,
  input[type="search"],
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    color: #f0e0c0;
    font-size: 13px;
    padding: 9px 10px;
    font-family: inherit;
    outline: none;
  }
  select option { background: #1a1025; }
  textarea { min-height: 48px; resize: vertical; line-height: 1.5; }

  .btn {
    min-height: 38px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:hover { background: var(--gold-bg); border-color: var(--gold); }
  .btn.primary {
    border-color: var(--gold);
    color: #f0e0c0;
    background: var(--gold-bg);
  }
  .btn.primary.editing {
    border-color: var(--blue);
    color: #dbe5ff;
    background: rgba(131,162,255,0.16);
  }
  .btn.danger { border-color: rgba(224,112,112,0.45); color: #f2a0a0; }
  .btn.full { width: 100%; min-height: 48px; font-size: 15px; font-family: 'Noto Serif JP', serif; }

  .builder-grid {
    display: grid;
    grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
    gap: 14px;
  }
  .filter-grid,
  .target-grid,
  .draft-actions {
    display: grid;
    gap: 10px;
  }
  .filter-grid { grid-template-columns: minmax(130px, 0.8fr) minmax(180px, 1.2fr); }
  .target-grid { grid-template-columns: 1fr; align-items: end; }
  .draft-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }

  .draft-summary {
    display: grid;
    gap: 6px;
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
  }
  .draft-name { color: #f0e0c0; font-weight: 800; font-size: 15px; }
  .draft-meta { color: var(--text-dark); font-size: 11px; }
  .draft-speed { color: var(--gold); font-weight: 800; }
  .draft-speed.manual,
  .lineup-speed.manual,
  .result-speed.manual {
    color: #dbe5ff;
  }
  .manual-speed-input {
    border-color: var(--gold-dim);
  }
  .manual-speed-input.active {
    border-color: var(--blue);
    background: rgba(131,162,255,0.1);
    color: #dbe5ff;
  }
  .manual-badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    border: 1px solid rgba(131,162,255,0.35);
    border-radius: 999px;
    color: #dbe5ff;
    background: rgba(131,162,255,0.1);
    font-size: 10px;
    font-weight: 700;
  }
  .editing-banner {
    padding: 7px 9px;
    border: 1px solid rgba(131,162,255,0.35);
    border-radius: 8px;
    color: #dbe5ff;
    background: rgba(131,162,255,0.1);
    font-size: 12px;
    font-weight: 700;
  }
  .next-target {
    margin-top: 8px;
    padding: 9px 10px;
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-size: 12px;
  }
  .next-target strong {
    color: var(--gold);
  }

  .side-tabs {
    display: grid;
    gap: 6px;
  }
  .side-tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .pick-btn {
    min-height: 34px;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid var(--gold-dim);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-family: inherit;
    cursor: pointer;
  }
  .pick-btn.active {
    border-color: var(--gold);
    background: var(--gold-bg);
    color: #f0e0c0;
    font-weight: 800;
  }
  .pick-btn.occupied:not(.active) {
    color: #d7b184;
    border-style: dashed;
  }

  .rune-panel { display: grid; gap: 8px; }
  .rune-row {
    display: grid;
    grid-template-columns: 58px minmax(0, 1fr);
    gap: 7px;
    align-items: center;
  }
  .rune-label { color: var(--text-dim); font-size: 11px; }
  .rune-buttons {
    display: grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: 4px;
  }
  .rune-btn {
    min-height: 28px;
    padding: 3px 2px;
    border-radius: 6px;
    border: 1px solid rgba(200,170,100,0.18);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
  }
  .rune-btn.active {
    border-color: var(--gold);
    background: var(--gold-bg);
    color: #f0e0c0;
    font-weight: 700;
  }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }
  .team-clear-actions {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin: 10px 0 14px;
  }
  .team-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    color: var(--gold);
    font-weight: 700;
  }
  .team-note { color: var(--text-dark); font-size: 11px; font-weight: 400; }
  .lineup-slot {
    display: grid;
    grid-template-columns: 30px minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .lineup-num { color: var(--gold); font-size: 12px; text-align: center; }
  .lineup-empty { color: var(--text-dark); font-size: 13px; }
  .lineup-name { color: #f0e0c0; font-weight: 800; font-size: 14px; }
  .lineup-meta { color: var(--text-dark); font-size: 11px; margin-top: 3px; line-height: 1.5; }
  .lineup-speed { color: var(--gold); font-weight: 800; }
  .lineup-manual-field {
    display: grid;
    grid-template-columns: auto minmax(120px, 180px);
    gap: 8px;
    align-items: center;
    margin-top: 8px;
    color: var(--text-dim);
    font-size: 11px;
  }
  .lineup-manual-field input {
    min-height: 30px;
    padding: 5px 8px;
    font-size: 12px;
  }
  .lineup-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .lineup-actions .btn { min-height: 30px; padding: 5px 8px; font-size: 11px; }
  .quick-rune-actions {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 6px;
    margin: 8px 0 10px;
  }
  .quick-rune-actions .btn {
    min-height: 32px;
    padding: 5px 8px;
    font-size: 11px;
  }

  .result-tools {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    margin-bottom: 12px;
  }
  .preset-panel {
    margin: 14px 0;
  }
  .preset-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) repeat(6, auto);
    gap: 8px;
    align-items: end;
  }
  .preset-status {
    margin-top: 8px;
    color: var(--text-dark);
    font-size: 11px;
    line-height: 1.6;
  }
  .memo-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.7;
  }
  .memo-box strong { color: var(--gold); }
  .turn-section { margin-bottom: 14px; }
  .turn-title {
    font-size: 12px; letter-spacing: 2px; color: var(--gold);
    margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
  }
  .turn-title::after { content: ''; flex: 1; height: 1px; background: var(--gold-dim); }
  .result-row {
    display: grid;
    grid-template-columns: 32px minmax(0, 72px) minmax(0, 1fr) auto;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid var(--gold-dim);
    background: rgba(255,255,255,0.02);
  }
  .result-rank { font-size: 18px; font-weight: 700; color: var(--gold); text-align: center; }
  .result-rank.rank1 { color: #ffd700; }
  .result-rank.rank2 { color: #c0c0c0; }
  .result-rank.rank3 { color: #cd7f32; }
  .side-chip {
    border: 1px solid var(--gold-dim);
    border-radius: 999px;
    padding: 3px 8px;
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
  }
  .side-chip.ally { color: #9fd6ff; border-color: rgba(131,162,255,0.35); }
  .side-chip.enemy { color: #ffb6b6; border-color: rgba(224,112,112,0.35); }
  .result-name { color: #f0e0c0; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .result-skill { color: var(--blue); font-size: 11px; }
  .result-memo { color: var(--text-dark); font-size: 11px; margin-top: 3px; }
  .result-speeds { text-align: right; }
  .result-speed { color: var(--gold); font-size: 16px; font-weight: 700; }
  .result-diff { color: var(--text-dark); font-size: 10px; margin-top: 2px; }
  .caution {
    background: rgba(200,150,50,0.08);
    border: 1px solid rgba(200,150,50,0.25);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    color: #b09050;
    line-height: 1.7;
    margin-bottom: 14px;
  }
  .footer-note { font-size: 10px; color: var(--text-dark); line-height: 1.8; text-align: center; margin-top: 8px; }
  .loading { text-align: center; padding: 20px; color: var(--text-dim); font-size: 13px; }

  @media (max-width: 900px) {
    .builder-grid,
    .filter-grid,
    .target-grid,
    .draft-actions,
    .team-grid,
    .team-clear-actions,
    .result-tools,
    .preset-grid {
      grid-template-columns: 1fr;
    }
    .rune-buttons { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .result-row { grid-template-columns: 30px 60px minmax(0, 1fr); }
    .result-speeds { grid-column: 3; text-align: left; }
  }
</style>
</head>
<body>
<div class="container">
  <nav class="site-nav" aria-label="サイト内ナビゲーション">
    <a class="site-back" href="./index.html">← サイトトップへ戻る</a>
  </nav>

  <div class="header">
    <div class="header-sub">MementoMori</div>
    <h1>スピード・行動順計算ツール</h1>
    <div class="header-line"></div>
  </div>

  <div id="loadingMsg" class="card loading">キャラデータ読み込み中...</div>

  <div id="mainContent" style="display:none">
    <section class="card">
      <div class="section-title">キャラ作成</div>
      <div class="builder-grid">
        <div>
          <div class="filter-grid">
            <div>
              <label for="attributeFilter">属性で絞り込み</label>
              <select id="attributeFilter" onchange="setFilters()">
                <option value="">全属性</option>
                <option value="藍">藍</option>
                <option value="紅">紅</option>
                <option value="翠">翠</option>
                <option value="黄">黄</option>
                <option value="天">天</option>
                <option value="冥">冥</option>
              </select>
            </div>
            <div>
              <label for="nameFilter">名前で絞り込み</label>
              <input id="nameFilter" type="search" placeholder="キャラ名で絞り込み" oninput="setFilters()">
            </div>
          </div>

          <label for="characterSelect" style="margin-top:10px">STEP 1 キャラを選ぶ</label>
          <select id="characterSelect" onchange="selectDraftCharacter(this.value)"></select>

          <div class="draft-summary" id="draftSummary"></div>
        </div>

        <div>
          <label>STEP 2 ルーンを選ぶ</label>
          <div class="rune-panel" id="draftRunes"></div>
          <div class="quick-rune-actions">
            <button class="btn" type="button" onclick="setDraftAllRunes(10)">全Lv10</button>
            <button class="btn" type="button" onclick="setDraftAllRunes(11)">全Lv11</button>
            <button class="btn" type="button" onclick="setDraftAllRunes(12)">全Lv12</button>
            <button class="btn" type="button" onclick="setDraftAllRunes(13)">全Lv13</button>
            <button class="btn" type="button" onclick="setDraftAllRunes(14)">全Lv14</button>
            <button class="btn" type="button" onclick="setDraftAllRunes(15)">全Lv15</button>
            <button class="btn" type="button" onclick="setDraftAllRunes(0)">なし</button>
          </div>

          <label for="draftManualSpeed">最終スピードを直接入力</label>
          <input
            id="draftManualSpeed"
            class="manual-speed-input"
            type="number"
            inputmode="numeric"
            min="0"
            placeholder="空欄なら基礎＋ルーンで計算"
            oninput="updateDraftManualSpeed(this.value)"
          >

          <label for="draftMemo">メモ</label>
          <textarea id="draftMemo" placeholder="役割、注意点、調整メモ" oninput="updateDraftMemo(this.value)"></textarea>

          <div class="target-grid" style="margin-top:10px">
            <div>
              <label>投入先</label>
              <div class="side-tabs" id="sideTabs"></div>
              <div class="next-target" id="nextTarget"></div>
            </div>
          </div>

          <div class="draft-actions" id="draftActions" style="margin-top:10px"></div>
        </div>
      </div>
    </section>

    <div class="team-grid">
      <section class="card">
        <div class="team-title">
          <span>自軍</span>
          <span class="team-note">最大5体</span>
        </div>
        <div id="allyList"></div>
      </section>

      <section class="card">
        <div class="team-title">
          <span>敵軍</span>
          <span class="team-note">最大5体</span>
        </div>
        <div id="enemyList"></div>
      </section>
    </div>

    <div class="team-clear-actions" aria-label="編成一斉クリア">
      <button class="btn danger" type="button" onclick="clearTeam('ally')">自軍クリア</button>
      <button class="btn danger" type="button" onclick="clearTeam('enemy')">敵軍クリア</button>
      <button class="btn danger" type="button" onclick="clearAll()">全クリア</button>
    </div>

    <button class="btn primary full" onclick="calcOrder()">⚡ 行動順を計算する</button>

    <section class="card preset-panel" aria-label="編成プリセット">
      <div class="section-title">編成プリセット</div>
      <div class="preset-grid">
        <div>
          <label for="presetSelect">保存済みプリセット</label>
          <select id="presetSelect"></select>
        </div>
        <button class="btn primary" type="button" onclick="loadPreset()">読み込み</button>
        <button class="btn primary" type="button" onclick="overwritePreset()">上書き保存</button>
        <button class="btn primary" type="button" onclick="savePreset('all')">全体保存</button>
        <button class="btn" type="button" onclick="savePreset('ally')">自軍保存</button>
        <button class="btn" type="button" onclick="savePreset('enemy')">敵軍保存</button>
        <button class="btn danger" type="button" onclick="deletePreset()">削除</button>
      </div>
      <div class="preset-status" id="presetStatus">保存先はこのブラウザ内のみです。サーバーには送信しません。</div>
    </section>

    <div id="resultArea"></div>

    <nav class="site-nav bottom" aria-label="サイト内ナビゲーション">
      <a class="site-back" href="./index.html">← サイトトップへ戻る</a>
    </nav>

    <div class="footer-note">
      ※ 実際の行動順にはゲーム内の乱数処理が含まれます<br>
      ※ 表示順と実際の行動順が異なる場合があります<br>
      ※ 基礎倍率やバフ・デバフは今後対応予定
    </div>
  </div>
</div>

<script>
const RUNE_TABLE = [
  { lv: 0, speed: 0, label: 'なし' },
  { lv: 1, speed: 10, label: 'Lv1' },
  { lv: 2, speed: 18, label: 'Lv2' },
  { lv: 3, speed: 33, label: 'Lv3' },
  { lv: 4, speed: 53, label: 'Lv4' },
  { lv: 5, speed: 80, label: 'Lv5' },
  { lv: 6, speed: 110, label: 'Lv6' },
  { lv: 7, speed: 150, label: 'Lv7' },
  { lv: 8, speed: 195, label: 'Lv8' },
  { lv: 9, speed: 240, label: 'Lv9' },
  { lv: 10, speed: 300, label: 'Lv10' },
  { lv: 11, speed: 360, label: 'Lv11' },
  { lv: 12, speed: 425, label: 'Lv12' },
  { lv: 13, speed: 500, label: 'Lv13' },
  { lv: 14, speed: 575, label: 'Lv14' },
  { lv: 15, speed: 660, label: 'Lv15' },
];

const SIDES = [
  { id: 'ally', label: '自軍', target: 'allyList' },
  { id: 'enemy', label: '敵軍', target: 'enemyList' },
];
const PRESET_STORAGE_KEY = 'speed-calc-presets';

let characters = [];
let skills = [];
let filters = { attribute: '', name: '' };
let entries = [];
let draft = createDraft();

function createDraft(side = 'ally') {
  return { charaId: '', rune: [0, 0, 0], manualSpeed: '', memo: '', side, editingKey: null };
}

function createEmptyEntry(side, slot) {
  return { side, slot, charaId: '', rune: [0, 0, 0], manualSpeed: '', memo: '' };
}

function normalizeEntry(entry, side, slot) {
  const rune = Array.isArray(entry?.rune) ? entry.rune.slice(0, 3) : [];
  while (rune.length < 3) rune.push(0);
  return {
    side,
    slot,
    charaId: typeof entry?.charaId === 'string' ? entry.charaId : '',
    rune: rune.map((level) => Number.isFinite(Number(level)) ? Number(level) : 0),
    manualSpeed: entry?.manualSpeed === undefined || entry?.manualSpeed === null ? '' : String(entry.manualSpeed),
    memo: typeof entry?.memo === 'string' ? entry.memo : '',
  };
}

function normalizeEntries(sourceEntries) {
  return SIDES.flatMap((side) =>
    Array.from({ length: 5 }, (_, slot) => {
      const found = Array.isArray(sourceEntries)
        ? sourceEntries.find((entry) => entry?.side === side.id && Number(entry?.slot) === slot)
        : null;
      return found ? normalizeEntry(found, side.id, slot) : createEmptyEntry(side.id, slot);
    })
  );
}

function scopedEntries(scope = 'all') {
  return entries.filter((entry) => scope === 'all' || entry.side === scope);
}

function presetSnapshot(scope = 'all') {
  return scopedEntries(scope).map((entry) => ({
    side: entry.side,
    slot: entry.slot,
    charaId: entry.charaId,
    rune: [...entry.rune],
    manualSpeed: entry.manualSpeed,
    memo: entry.memo,
  }));
}

function presetScope(preset) {
  return ['ally', 'enemy', 'all'].includes(preset?.scope) ? preset.scope : 'all';
}

function scopeLabel(scope) {
  if (scope === 'ally') return '自軍';
  if (scope === 'enemy') return '敵軍';
  return '全体';
}

function readPresets() {
  try {
    const raw = localStorage.getItem(PRESET_STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [];
  }
}

function writePresets(presets) {
  localStorage.setItem(PRESET_STORAGE_KEY, JSON.stringify(presets));
}

function presetLabel(preset) {
  const scope = presetScope(preset);
  const count = normalizeEntries(preset.entries).filter((entry) =>
    entry.charaId && (scope === 'all' || entry.side === scope)
  ).length;
  const date = preset.updatedAt ? new Date(preset.updatedAt) : null;
  const dateText = date && !Number.isNaN(date.getTime())
    ? date.toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
    : '日時なし';
  return `[${scopeLabel(scope)}] ${preset.name || '無題'}（${count}体 / ${dateText}）`;
}

function setPresetStatus(message) {
  const target = document.getElementById('presetStatus');
  if (target) target.textContent = message;
}

async function loadData() {
  try {
    const res = await fetch('./data/mementomori-skills.json');
    const json = await res.json();
    characters = (json.characters || []).filter((character) => character.id && character.name);
    skills = json.skills || [];
    entries = SIDES.flatMap((side) =>
      Array.from({ length: 5 }, (_, index) => createEmptyEntry(side.id, index))
    );
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    renderAll();
  } catch (error) {
    document.getElementById('loadingMsg').textContent = 'データ読み込みに失敗しました。サーバー上で動作させてください。';
  }
}

function entryKey(entry) {
  return `${entry.side}:${entry.slot}`;
}

function keyOf(side, slot) {
  return `${side}:${slot}`;
}

function getCharacter(id) {
  return characters.find((character) => character.id === id);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function runeSpeed(level) {
  return RUNE_TABLE.find((rune) => rune.lv === level)?.speed || 0;
}

function runeSum(data) {
  return data.rune.reduce((sum, level) => sum + runeSpeed(level), 0);
}

function manualSpeedValue(data) {
  const raw = String(data?.manualSpeed ?? '').replaceAll(',', '').trim();
  if (!raw) return null;
  const value = Number(raw);
  return Number.isFinite(value) && value >= 0 ? Math.floor(value) : null;
}

function usesManualSpeed(data) {
  return manualSpeedValue(data) !== null;
}

function calculatedSpeed(data) {
  const character = getCharacter(data.charaId);
  return character ? (character.speed || 0) + runeSum(data) : null;
}

function finalSpeed(data) {
  const character = getCharacter(data.charaId);
  if (!character) return null;
  const manual = manualSpeedValue(data);
  return manual !== null ? manual : calculatedSpeed(data);
}

function formatSpeed(value) {
  return value === null ? '-' : value.toLocaleString();
}

function getSkillName(characterId, number) {
  const skill = skills.find((item) =>
    item.characterId === characterId &&
    item.number === number &&
    item.skillType === 'アクティブ'
  );
  return skill?.name || `スキル${number}`;
}

function setFilters() {
  filters.attribute = document.getElementById('attributeFilter').value;
  filters.name = document.getElementById('nameFilter').value.trim().toLowerCase();
  renderBuilder();
}

function sortName(name) {
  return String(name || '').replace(/^[\[［][^\]］]+[\]］]/, '');
}

function selectedIds(side = draft.side, exceptKey = draft.editingKey) {
  return new Set(
    entries
      .filter((entry) => entry.side === side && entry.charaId && entryKey(entry) !== exceptKey)
      .map((entry) => entry.charaId)
  );
}

function filteredCharacters() {
  const used = selectedIds();
  return characters
    .filter((character) => !filters.attribute || character.attribute === filters.attribute)
    .filter((character) => !filters.name || character.name.toLowerCase().includes(filters.name))
    .filter((character) => character.id === draft.charaId || !used.has(character.id))
    .sort((a, b) => {
      const primary = sortName(a.name).localeCompare(sortName(b.name), 'ja');
      return primary || (a.name || '').localeCompare(b.name || '', 'ja');
    });
}

function selectDraftCharacter(value) {
  draft.charaId = value;
  renderBuilder();
}

function setDraftRune(index, level) {
  draft.rune[index] = level;
  renderBuilder();
}

function setDraftAllRunes(level) {
  draft.rune = [level, level, level];
  renderBuilder();
}

function updateDraftMemo(value) {
  draft.memo = value;
}

function updateDraftManualSpeed(value) {
  draft.manualSpeed = value;
  renderDraftSummary();
  renderManualSpeedInput();
}

function updateEntryManualSpeed(side, slot, value) {
  const entry = findEntry(side, slot);
  if (!entry) return;
  entry.manualSpeed = value;
  const manual = usesManualSpeed(entry);
  const speed = document.getElementById(`lineupSpeed-${side}-${slot}`);
  if (speed) {
    speed.textContent = formatSpeed(finalSpeed(entry));
    speed.classList.toggle('manual', manual);
  }
  const badge = document.getElementById(`manualBadge-${side}-${slot}`);
  if (badge) badge.style.display = manual ? 'inline-block' : 'none';
  const input = document.getElementById(`manualInput-${side}-${slot}`);
  if (input) input.classList.toggle('active', manual);
  if (draft.editingKey === keyOf(side, slot)) {
    draft.manualSpeed = value;
    renderDraftSummary();
    renderManualSpeedInput();
  }
  document.getElementById('resultArea').innerHTML = '';
}

function setDraftSide(side) {
  draft.side = side;
  renderBuilder();
}

function findEntry(side, slot) {
  return entries.find((entry) => entry.side === side && entry.slot === slot);
}

function firstEmptySlot(side) {
  const open = entries.find((entry) => entry.side === side && !entry.charaId);
  return open ? open.slot : -1;
}

function nextSideAfterPlace(side) {
  if (firstEmptySlot(side) >= 0) return side;
  if (side === 'ally' && firstEmptySlot('enemy') >= 0) return 'enemy';
  return side;
}

function placeDraft() {
  if (!draft.charaId) {
    alert('先にキャラを選択してください。');
    return;
  }

  const source = draft.editingKey ? entries.find((entry) => entryKey(entry) === draft.editingKey) : null;
  const targetSlot = source && source.side === draft.side ? source.slot : firstEmptySlot(draft.side);
  if (targetSlot < 0) {
    alert(`${sideLabel(draft.side)}に空き枠がありません。不要な枠をクリアしてから入れてください。`);
    return;
  }

  const target = findEntry(draft.side, targetSlot);
  if (!target) return;

  const targetKey = keyOf(draft.side, targetSlot);
  const duplicate = entries.find((entry) =>
    entry.side === draft.side &&
    entry.charaId === draft.charaId &&
    entryKey(entry) !== draft.editingKey &&
    entryKey(entry) !== targetKey
  );
  if (duplicate) {
    alert(`同じキャラは${sideLabel(draft.side)}内で重複登録できません。敵味方に同じキャラを入れることはできます。`);
    return;
  }

  if (draft.editingKey && draft.editingKey !== targetKey) {
    if (source) Object.assign(source, createEmptyEntry(source.side, source.slot));
  }

  target.charaId = draft.charaId;
  target.rune = [...draft.rune];
  target.manualSpeed = draft.manualSpeed;
  target.memo = draft.memo;
  draft = createDraft(nextSideAfterPlace(draft.side));
  document.getElementById('resultArea').innerHTML = '';
  renderAll();
}

function editEntry(side, slot) {
  const entry = findEntry(side, slot);
  if (!entry || !entry.charaId) return;
  draft = {
    charaId: entry.charaId,
    rune: [...entry.rune],
    manualSpeed: entry.manualSpeed,
    memo: entry.memo,
    side,
    editingKey: keyOf(side, slot),
  };
  renderAll();
  document.getElementById('characterSelect').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function clearSlot(side, slot) {
  const entry = findEntry(side, slot);
  if (!entry) return;
  Object.assign(entry, createEmptyEntry(side, slot));
  if (draft.editingKey === keyOf(side, slot)) draft = createDraft();
  document.getElementById('resultArea').innerHTML = '';
  renderAll();
}

function clearTeam(side) {
  const label = sideLabel(side);
  if (!confirm(`${label}をすべてクリアします。よろしいですか？`)) return;
  entries = entries.map((entry) =>
    entry.side === side ? createEmptyEntry(entry.side, entry.slot) : entry
  );
  if (draft.side === side || draft.editingKey?.startsWith(`${side}:`)) draft = createDraft(side);
  document.getElementById('resultArea').innerHTML = '';
  renderAll();
}

function clearAll() {
  if (!confirm('自軍/敵軍をすべてクリアします。よろしいですか？')) return;
  entries = SIDES.flatMap((side) =>
    Array.from({ length: 5 }, (_, index) => createEmptyEntry(side.id, index))
  );
  draft = createDraft();
  document.getElementById('resultArea').innerHTML = '';
  renderAll();
}

function resetDraft() {
  draft = createDraft(draft.side);
  renderBuilder();
}

function sideLabel(side) {
  return SIDES.find((item) => item.id === side)?.label || '';
}

function renderCharacterOptions() {
  const candidates = filteredCharacters();
  const current = draft.charaId && !candidates.some((character) => character.id === draft.charaId)
    ? `<option value="${draft.charaId}" selected>${escapeHtml(getCharacter(draft.charaId)?.name || '選択中のキャラ')}</option>`
    : '';
  const options = candidates.map((character) => `
    <option value="${character.id}" ${character.id === draft.charaId ? 'selected' : ''}>
      ${escapeHtml(character.name)}（${(character.speed || 0).toLocaleString()} / ${escapeHtml(character.attribute || '-')})
    </option>
  `).join('');
  document.getElementById('characterSelect').innerHTML = `<option value="">-- キャラを選択 --</option>${current}${options}`;
}

function renderDraftSummary() {
  const character = getCharacter(draft.charaId);
  const speed = finalSpeed(draft);
  const manual = usesManualSpeed(draft);
  const source = draft.editingKey ? entries.find((entry) => entryKey(entry) === draft.editingKey) : null;
  const editNotice = source
    ? `<div class="editing-banner">編集中：${escapeHtml(sideLabel(source.side))} ${source.slot + 1} を修正中</div>`
    : '';
  document.getElementById('draftSummary').innerHTML = character ? `
    ${editNotice}
    <div class="draft-name">${escapeHtml(character.name)}</div>
    <div class="draft-meta">
      ${escapeHtml(character.attribute || '-')} / 基礎 ${(character.speed || 0).toLocaleString()} / ルーン +${runeSum(draft).toLocaleString()}
      ${manual ? `<span class="manual-badge">直入力使用</span>` : ''}
    </div>
    <div>最終スピード：<span class="draft-speed ${manual ? 'manual' : ''}">${formatSpeed(speed)}</span></div>
  ` : `
    ${editNotice}
    <div class="draft-name">未選択</div>
    <div class="draft-meta">絞り込み後、キャラを選んでからルーンを調整してください。</div>
  `;
}

function renderManualSpeedInput() {
  const input = document.getElementById('draftManualSpeed');
  if (!input) return;
  if (input.value !== String(draft.manualSpeed ?? '')) input.value = draft.manualSpeed ?? '';
  input.classList.toggle('active', usesManualSpeed(draft));
}

function renderDraftRunes() {
  document.getElementById('draftRunes').innerHTML = [0, 1, 2].map((index) => `
    <div class="rune-row">
      <span class="rune-label">ルーン${index + 1}</span>
      <div class="rune-buttons">
        ${RUNE_TABLE.map((rune) => `
          <button
            type="button"
            class="rune-btn ${draft.rune[index] === rune.lv ? 'active' : ''}"
            onclick="setDraftRune(${index}, ${rune.lv})"
            title="${rune.label} (+${rune.speed})"
          >${rune.label}</button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderTargetControls() {
  document.getElementById('sideTabs').innerHTML = SIDES.map((side) => `
    <button type="button" class="pick-btn ${draft.side === side.id ? 'active' : ''}" onclick="setDraftSide('${side.id}')">${side.label}</button>
  `).join('');

  const source = draft.editingKey ? entries.find((entry) => entryKey(entry) === draft.editingKey) : null;
  const targetSlot = source && source.side === draft.side ? source.slot : firstEmptySlot(draft.side);
  const targetText = targetSlot >= 0
    ? `${sideLabel(draft.side)} ${targetSlot + 1}`
    : `${sideLabel(draft.side)}に空き枠なし`;
  const label = draft.editingKey ? '更新対象' : '次に入る枠';
  document.getElementById('nextTarget').innerHTML = `${label}：<strong>${escapeHtml(targetText)}</strong>`;
}

function renderDraftActions() {
  const isEditing = Boolean(draft.editingKey);
  document.getElementById('draftActions').innerHTML = `
    <button class="btn primary ${isEditing ? 'editing' : ''}" type="button" onclick="placeDraft()">
      ${isEditing ? '編集を完了する' : '次の空き枠へ入れる'}
    </button>
    <button class="btn danger" type="button" onclick="resetDraft()">
      ${isEditing ? '編集をやめる' : '作成中クリア'}
    </button>
  `;
}

function renderBuilder() {
  renderCharacterOptions();
  renderDraftSummary();
  renderDraftRunes();
  renderTargetControls();
  renderDraftActions();
  renderManualSpeedInput();
  const memo = document.getElementById('draftMemo');
  if (memo && memo.value !== draft.memo) memo.value = draft.memo;
}

function renderLineup() {
  SIDES.forEach((side) => {
    document.getElementById(side.target).innerHTML = entries
      .filter((entry) => entry.side === side.id)
      .map((entry) => {
        const character = getCharacter(entry.charaId);
        if (!character) {
          return `
            <div class="lineup-slot">
              <span class="lineup-num">${entry.slot + 1}</span>
              <span class="lineup-empty">空き枠</span>
              <span></span>
            </div>
          `;
        }
        const manual = usesManualSpeed(entry);
        return `
          <div class="lineup-slot">
            <span class="lineup-num">${entry.slot + 1}</span>
            <div>
              <div class="lineup-name">${escapeHtml(character.name)}</div>
              <div class="lineup-meta">
                最終 <span id="lineupSpeed-${entry.side}-${entry.slot}" class="lineup-speed ${manual ? 'manual' : ''}">${formatSpeed(finalSpeed(entry))}</span>
                <span id="manualBadge-${entry.side}-${entry.slot}" class="manual-badge" style="${manual ? '' : 'display:none'}">直入力使用</span>
                / 基礎 ${(character.speed || 0).toLocaleString()}
                / ルーン +${runeSum(entry).toLocaleString()}
                ${entry.memo ? `<br>${escapeHtml(entry.memo)}` : ''}
              </div>
              <label class="lineup-manual-field">
                <span>直接入力</span>
                <input
                  id="manualInput-${entry.side}-${entry.slot}"
                  class="manual-speed-input ${manual ? 'active' : ''}"
                  type="number"
                  inputmode="numeric"
                  min="0"
                  value="${escapeHtml(entry.manualSpeed ?? '')}"
                  placeholder="空欄はルーン計算"
                  oninput="updateEntryManualSpeed('${entry.side}', ${entry.slot}, this.value)"
                >
              </label>
            </div>
            <div class="lineup-actions">
              <button class="btn" type="button" onclick="editEntry('${entry.side}', ${entry.slot})">編集</button>
              <button class="btn danger" type="button" onclick="clearSlot('${entry.side}', ${entry.slot})">クリア</button>
            </div>
          </div>
        `;
      })
      .join('');
  });
}

function renderAll() {
  renderBuilder();
  renderLineup();
  renderPresetList();
}

function renderPresetList(selectedId = '') {
  const select = document.getElementById('presetSelect');
  if (!select) return;
  const presets = readPresets().sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
  select.innerHTML = presets.length
    ? presets.map((preset) => `
      <option value="${escapeHtml(preset.id)}" ${preset.id === selectedId ? 'selected' : ''}>${escapeHtml(presetLabel(preset))}</option>
    `).join('')
    : '<option value="">保存済みプリセットなし</option>';
}

function savePreset(scope = 'all') {
  const normalizedScope = ['ally', 'enemy'].includes(scope) ? scope : 'all';
  if (!scopedEntries(normalizedScope).some((entry) => entry.charaId)) {
    alert('保存するキャラがありません。');
    return;
  }

  const label = scopeLabel(normalizedScope);
  const name = prompt(`${label}プリセット名を入力してください。`, '');
  if (name === null) return;
  const trimmedName = name.trim();
  if (!trimmedName) {
    alert('プリセット名を入力してください。');
    return;
  }

  const now = new Date().toISOString();
  const preset = {
    id: `preset-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
    name: trimmedName,
    scope: normalizedScope,
    createdAt: now,
    updatedAt: now,
    entries: presetSnapshot(normalizedScope),
  };

  try {
    const presets = readPresets();
    presets.push(preset);
    writePresets(presets);
    renderPresetList(preset.id);
    setPresetStatus(`保存しました：[${label}] ${trimmedName}`);
  } catch (error) {
    alert('保存に失敗しました。ブラウザの保存容量が足りない可能性があります。');
  }
}

function selectedPreset() {
  const select = document.getElementById('presetSelect');
  const id = select?.value || '';
  if (!id) return null;
  return readPresets().find((preset) => preset.id === id) || null;
}

function overwritePreset() {
  const preset = selectedPreset();
  if (!preset) {
    alert('上書きするプリセットを選択してください。');
    return;
  }

  const scope = presetScope(preset);
  const label = scopeLabel(scope);
  if (!scopedEntries(scope).some((entry) => entry.charaId)) {
    alert(`現在の${label}に保存するキャラがありません。`);
    return;
  }
  if (!confirm(`プリセット「[${label}] ${preset.name || '無題'}」を現在の${label}で上書きします。よろしいですか？`)) return;

  try {
    const presets = readPresets();
    const index = presets.findIndex((item) => item.id === preset.id);
    if (index < 0) {
      alert('上書き対象のプリセットが見つかりません。');
      renderPresetList();
      return;
    }
    const now = new Date().toISOString();
    presets[index] = {
      ...presets[index],
      scope,
      updatedAt: now,
      entries: presetSnapshot(scope),
    };
    writePresets(presets);
    renderPresetList(preset.id);
    setPresetStatus(`上書き保存しました：[${label}] ${preset.name || '無題'}`);
  } catch (error) {
    alert('上書き保存に失敗しました。ブラウザの保存容量が足りない可能性があります。');
  }
}

function loadPreset() {
  const preset = selectedPreset();
  if (!preset) {
    alert('読み込むプリセットを選択してください。');
    return;
  }
  const scope = presetScope(preset);
  const label = scopeLabel(scope);
  const confirmMessage = scope === 'all'
    ? `現在の自軍/敵軍を「${preset.name || '無題'}」で上書きします。よろしいですか？`
    : `現在の${label}を「${preset.name || '無題'}」で上書きします。よろしいですか？`;
  if (!confirm(confirmMessage)) return;

  const loadedEntries = normalizeEntries(preset.entries);
  entries = scope === 'all'
    ? loadedEntries
    : entries.map((entry) => {
      if (entry.side !== scope) return entry;
      const loaded = loadedEntries.find((item) => item.side === entry.side && item.slot === entry.slot);
      return loaded || createEmptyEntry(entry.side, entry.slot);
    });
  draft = createDraft();
  document.getElementById('resultArea').innerHTML = '';
  renderAll();
  renderPresetList(preset.id);
  setPresetStatus(`読み込みました：[${label}] ${preset.name || '無題'}`);
}

function deletePreset() {
  const preset = selectedPreset();
  if (!preset) {
    alert('削除するプリセットを選択してください。');
    return;
  }
  if (!confirm(`プリセット「${preset.name || '無題'}」を削除します。よろしいですか？`)) return;

  const presets = readPresets().filter((item) => item.id !== preset.id);
  writePresets(presets);
  renderPresetList();
  setPresetStatus(`削除しました：${preset.name || '無題'}`);
}

function validEntries() {
  return entries
    .filter((entry) => entry.charaId)
    .map((entry) => {
      const character = getCharacter(entry.charaId);
      return {
        side: entry.side,
        sideLabel: sideLabel(entry.side),
        name: character?.name || '不明',
        base: character?.speed || 0,
        runeSum: runeSum(entry),
        finalSpeed: finalSpeed(entry) || 0,
        manualSpeed: usesManualSpeed(entry),
        skill1: getSkillName(entry.charaId, 1),
        skill2: getSkillName(entry.charaId, 2),
        memo: entry.memo.trim(),
      };
    });
}

function resultRow(row, index, rows, skillName) {
  const diff = index < rows.length - 1 ? row.finalSpeed - rows[index + 1].finalSpeed : null;
  return `
    <div class="result-row">
      <div class="result-rank ${index === 0 ? 'rank1' : index === 1 ? 'rank2' : index === 2 ? 'rank3' : ''}">${index + 1}</div>
      <div class="side-chip ${row.side}">${row.sideLabel}</div>
      <div>
        <div class="result-name">${escapeHtml(row.name)}</div>
        <div class="result-skill">${escapeHtml(skillName)}</div>
        ${row.memo ? `<div class="result-memo">${escapeHtml(row.memo)}</div>` : ''}
      </div>
      <div class="result-speeds">
        <div class="result-speed ${row.manualSpeed ? 'manual' : ''}">${row.finalSpeed.toLocaleString()}</div>
        ${diff !== null ? `<div class="result-diff">↓ 差 ${diff.toLocaleString()}</div>` : ''}
      </div>
    </div>
  `;
}

function calcOrder() {
  const rows = validEntries().sort((a, b) => b.finalSpeed - a.finalSpeed);
  if (rows.length === 0) {
    alert('キャラを1体以上選択してください。');
    return;
  }

  const memoRows = rows.filter((row) => row.memo);
  const memoHtml = memoRows.length
    ? `<div class="memo-box"><strong>メモ</strong><br>${memoRows.map((row) => `${escapeHtml(row.sideLabel)} ${escapeHtml(row.name)}: ${escapeHtml(row.memo)}`).join('<br>')}</div>`
    : '<div class="memo-box">メモなし</div>';

  document.getElementById('resultArea').innerHTML = `
    <div class="result-tools">
      ${memoHtml}
      <button class="btn danger" type="button" onclick="clearAll()">全クリア</button>
    </div>
    <div class="caution">⚠️ 実際の行動順にはゲーム内の乱数が含まれます。スピード差が小さい場合は逆転することがあります。</div>
    <div class="turn-section">
      <div class="turn-title">1ターン目　スキル1使用</div>
      ${rows.map((row, index) => resultRow(row, index, rows, row.skill1)).join('')}
    </div>
    <div class="turn-section">
      <div class="turn-title">2ターン目　スキル2使用</div>
      ${rows.map((row, index) => resultRow(row, index, rows, row.skill2)).join('')}
    </div>
  `;
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

loadData();
</script>
</body>
</html>
