<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スピード・行動順計算ツール｜メメントモリ攻略</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8aa64;
    --gold-dim: rgba(200,170,100,0.22);
    --gold-bg: rgba(200,170,100,0.1);
    --bg: #0d0a14;
    --bg2: #1a1025;
    --card: rgba(255,255,255,0.04);
    --text: #e8d9c0;
    --text-dim: #a08060;
    --text-dark: #604030;
    --blue: #83a2ff;
    --red: #e07070;
    --border: rgba(200,170,100,0.25);
  }

  body {
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 24px 14px 40px;
  }

  .container { max-width: 1120px; margin: 0 auto; }
  .site-nav { margin-bottom: 18px; }
  .site-nav.bottom { margin: 18px 0 0; text-align: center; }
  .site-back {
    display: inline-flex; align-items: center; gap: 6px; color: var(--gold);
    font-size: 13px; font-weight: 700; text-decoration: none;
  }
  .site-back:hover { text-decoration: underline; }

  .header { text-align: center; margin-bottom: 24px; }
  .header-sub {
    font-size: 11px; letter-spacing: 4px; color: var(--gold); margin-bottom: 6px;
    text-transform: uppercase; font-family: 'Noto Serif JP', serif;
  }
  .header h1 {
    font-size: clamp(21px, 4vw, 32px); font-weight: 700; color: #f0e0c0;
    font-family: 'Noto Serif JP', serif; line-height: 1.4;
  }
  .header-line {
    width: 48px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 10px auto 0;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .section-title {
    font-size: 12px; letter-spacing: 2px; color: var(--gold);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Serif JP', serif; font-weight: 700;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--gold-dim); }

  .toolbar {
    display: grid;
    grid-template-columns: minmax(170px, 1fr) minmax(220px, 1.4fr) auto;
    gap: 10px;
    align-items: end;
  }
  label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
  select,
  input[type="search"],
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    color: #f0e0c0;
    font-size: 13px;
    padding: 9px 10px;
    font-family: inherit;
    outline: none;
  }
  select option { background: #1a1025; }
  textarea { min-height: 44px; resize: vertical; line-height: 1.5; }

  .btn {
    min-height: 38px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  .btn:hover { background: var(--gold-bg); border-color: var(--gold); }
  .btn.primary {
    width: 100%;
    min-height: 48px;
    border-color: var(--gold);
    color: #f0e0c0;
    background: var(--gold-bg);
    font-size: 15px;
    font-family: 'Noto Serif JP', serif;
  }
  .btn.danger { border-color: rgba(224,112,112,0.45); color: #f2a0a0; }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }
  .team-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    color: var(--gold);
    font-weight: 700;
  }
  .team-note { color: var(--text-dark); font-size: 11px; font-weight: 400; }

  .slot-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .slot-head {
    display: grid;
    grid-template-columns: 28px minmax(0, 1fr);
    gap: 8px;
    align-items: center;
    margin-bottom: 9px;
  }
  .slot-num { color: var(--gold); font-size: 12px; text-align: center; }

  .rune-panel {
    display: grid;
    gap: 8px;
    margin-top: 8px;
  }
  .rune-row {
    display: grid;
    grid-template-columns: 52px minmax(0, 1fr);
    gap: 7px;
    align-items: center;
  }
  .rune-label { color: var(--text-dim); font-size: 11px; }
  .rune-buttons {
    display: grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: 4px;
  }
  .rune-btn {
    min-height: 28px;
    padding: 3px 2px;
    border-radius: 6px;
    border: 1px solid rgba(200,170,100,0.18);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
  }
  .rune-btn.active {
    border-color: var(--gold);
    background: var(--gold-bg);
    color: #f0e0c0;
    font-weight: 700;
  }
  .slot-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .slot-actions .btn {
    min-height: 30px;
    padding: 5px 8px;
    font-size: 11px;
  }
  .speed-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    padding: 9px 10px;
    background: var(--gold-bg);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
  }
  .speed-breakdown { color: var(--text-dark); font-size: 11px; }
  .speed-value { color: var(--gold); font-size: 18px; font-weight: 700; }

  .result-tools {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    margin-bottom: 12px;
  }
  .memo-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.7;
  }
  .memo-box strong { color: var(--gold); }

  .turn-section { margin-bottom: 14px; }
  .turn-title {
    font-size: 12px; letter-spacing: 2px; color: var(--gold);
    margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
  }
  .turn-title::after { content: ''; flex: 1; height: 1px; background: var(--gold-dim); }
  .result-row {
    display: grid;
    grid-template-columns: 32px minmax(0, 72px) minmax(0, 1fr) auto;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid var(--gold-dim);
    background: rgba(255,255,255,0.02);
  }
  .result-rank { font-size: 18px; font-weight: 700; color: var(--gold); text-align: center; }
  .result-rank.rank1 { color: #ffd700; }
  .result-rank.rank2 { color: #c0c0c0; }
  .result-rank.rank3 { color: #cd7f32; }
  .side-chip {
    border: 1px solid var(--gold-dim);
    border-radius: 999px;
    padding: 3px 8px;
    color: var(--text-dim);
    font-size: 11px;
    text-align: center;
  }
  .side-chip.ally { color: #9fd6ff; border-color: rgba(131,162,255,0.35); }
  .side-chip.enemy { color: #ffb6b6; border-color: rgba(224,112,112,0.35); }
  .result-name { color: #f0e0c0; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .result-skill { color: var(--blue); font-size: 11px; }
  .result-memo { color: var(--text-dark); font-size: 11px; margin-top: 3px; }
  .result-speeds { text-align: right; }
  .result-speed { color: var(--gold); font-size: 16px; font-weight: 700; }
  .result-diff { color: var(--text-dark); font-size: 10px; margin-top: 2px; }
  .caution {
    background: rgba(200,150,50,0.08);
    border: 1px solid rgba(200,150,50,0.25);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11px;
    color: #b09050;
    line-height: 1.7;
    margin-bottom: 14px;
  }
  .footer-note { font-size: 10px; color: var(--text-dark); line-height: 1.8; text-align: center; margin-top: 8px; }
  .loading { text-align: center; padding: 20px; color: var(--text-dim); font-size: 13px; }

  @media (max-width: 900px) {
    .toolbar,
    .team-grid,
    .result-tools {
      grid-template-columns: 1fr;
    }
    .rune-buttons {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .result-row {
      grid-template-columns: 30px 60px minmax(0, 1fr);
    }
    .result-speeds {
      grid-column: 3;
      text-align: left;
    }
  }
</style>
</head>
<body>
<div class="container">
  <nav class="site-nav" aria-label="サイト内ナビゲーション">
    <a class="site-back" href="./index.html">← サイトトップへ戻る</a>
  </nav>

  <div class="header">
    <div class="header-sub">MementoMori</div>
    <h1>スピード・行動順計算ツール</h1>
    <div class="header-line"></div>
  </div>

  <div id="loadingMsg" class="card loading">キャラデータ読み込み中...</div>

  <div id="mainContent" style="display:none">
    <div class="card">
      <div class="section-title">絞り込み</div>
      <div class="toolbar">
        <div>
          <label for="attributeFilter">属性</label>
          <select id="attributeFilter" onchange="setFilters()">
            <option value="">全属性</option>
            <option value="藍">藍</option>
            <option value="紅">紅</option>
            <option value="翠">翠</option>
            <option value="黄">黄</option>
            <option value="天">天</option>
            <option value="冥">冥</option>
          </select>
        </div>
        <div>
          <label for="nameFilter">名前</label>
          <input id="nameFilter" type="search" placeholder="キャラ名で絞り込み" oninput="setFilters()">
        </div>
        <button class="btn danger" onclick="clearAll()">全クリア</button>
      </div>
    </div>

    <div class="team-grid">
      <section class="card">
        <div class="team-title">
          <span>自軍</span>
          <span class="team-note">最大5体</span>
        </div>
        <div id="allyList"></div>
      </section>

      <section class="card">
        <div class="team-title">
          <span>敵軍</span>
          <span class="team-note">最大5体</span>
        </div>
        <div id="enemyList"></div>
      </section>
    </div>

    <button class="btn primary" onclick="calcOrder()">⚡ 行動順を計算する</button>

    <div id="resultArea"></div>

    <nav class="site-nav bottom" aria-label="サイト内ナビゲーション">
      <a class="site-back" href="./index.html">← サイトトップへ戻る</a>
    </nav>

    <div class="footer-note">
      ※ 実際の行動順にはゲーム内の乱数処理が含まれます<br>
      ※ 表示順と実際の行動順が異なる場合があります<br>
      ※ バフ・デバフは第2段階で対応予定
    </div>
  </div>
</div>

<script>
const RUNE_TABLE = [
  { lv: 0, speed: 0, label: 'なし' },
  { lv: 1, speed: 10, label: 'Lv1' },
  { lv: 2, speed: 18, label: 'Lv2' },
  { lv: 3, speed: 33, label: 'Lv3' },
  { lv: 4, speed: 53, label: 'Lv4' },
  { lv: 5, speed: 80, label: 'Lv5' },
  { lv: 6, speed: 110, label: 'Lv6' },
  { lv: 7, speed: 150, label: 'Lv7' },
  { lv: 8, speed: 195, label: 'Lv8' },
  { lv: 9, speed: 240, label: 'Lv9' },
  { lv: 10, speed: 300, label: 'Lv10' },
  { lv: 11, speed: 360, label: 'Lv11' },
  { lv: 12, speed: 425, label: 'Lv12' },
  { lv: 13, speed: 500, label: 'Lv13' },
  { lv: 14, speed: 575, label: 'Lv14' },
  { lv: 15, speed: 660, label: 'Lv15' },
];

const SIDES = [
  { id: 'ally', label: '自軍', target: 'allyList' },
  { id: 'enemy', label: '敵軍', target: 'enemyList' },
];

let characters = [];
let skills = [];
let filters = { attribute: '', name: '' };
let entries = [];

function createEmptyEntry(side, slot) {
  return { side, slot, charaId: '', rune: [0, 0, 0], memo: '' };
}

async function loadData() {
  try {
    const res = await fetch('./data/mementomori-skills.json');
    const json = await res.json();
    characters = (json.characters || []).filter((character) => character.id && character.name);
    skills = json.skills || [];
    entries = SIDES.flatMap((side) =>
      Array.from({ length: 5 }, (_, index) => createEmptyEntry(side.id, index))
    );
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    renderAll();
  } catch (error) {
    document.getElementById('loadingMsg').textContent = 'データ読み込みに失敗しました。サーバー上で動作させてください。';
  }
}

function setFilters() {
  filters.attribute = document.getElementById('attributeFilter').value;
  filters.name = document.getElementById('nameFilter').value.trim().toLowerCase();
  renderAll();
}

function selectedIds(exceptEntry) {
  return new Set(
    entries
      .filter((entry) => entry !== exceptEntry && entry.charaId)
      .map((entry) => entry.charaId)
  );
}

function filteredCharacters(entry) {
  const used = selectedIds(entry);
  return characters
    .filter((character) => !filters.attribute || character.attribute === filters.attribute)
    .filter((character) => !filters.name || character.name.toLowerCase().includes(filters.name))
    .filter((character) => character.id === entry.charaId || !used.has(character.id))
    .sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ja'));
}

function getCharacter(id) {
  return characters.find((character) => character.id === id);
}

function getSkillName(characterId, number) {
  const skill = skills.find((item) =>
    item.characterId === characterId &&
    item.number === number &&
    item.skillType === 'アクティブ'
  );
  return skill?.name || `スキル${number}`;
}

function runeSpeed(level) {
  return RUNE_TABLE.find((rune) => rune.lv === level)?.speed || 0;
}

function runeSum(entry) {
  return entry.rune.reduce((sum, level) => sum + runeSpeed(level), 0);
}

function finalSpeed(entry) {
  const character = getCharacter(entry.charaId);
  return character ? (character.speed || 0) + runeSum(entry) : null;
}

function formatSpeed(value) {
  return value === null ? '-' : value.toLocaleString();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function changeCharacter(side, slot, value) {
  const entry = entries.find((item) => item.side === side && item.slot === slot);
  if (!entry) return;
  entry.charaId = value;
  renderAll();
}

function setRune(side, slot, index, level) {
  const entry = entries.find((item) => item.side === side && item.slot === slot);
  if (!entry) return;
  entry.rune[index] = level;
  renderAll();
}

function setAllRunes(side, slot, level) {
  const entry = entries.find((item) => item.side === side && item.slot === slot);
  if (!entry) return;
  entry.rune = [level, level, level];
  renderAll();
}

function updateMemo(side, slot, value) {
  const entry = entries.find((item) => item.side === side && item.slot === slot);
  if (entry) entry.memo = value;
}

function clearSlot(side, slot) {
  const index = entries.findIndex((item) => item.side === side && item.slot === slot);
  if (index === -1) return;
  entries[index] = createEmptyEntry(side, slot);
  renderAll();
}

function clearAll() {
  entries = SIDES.flatMap((side) =>
    Array.from({ length: 5 }, (_, index) => createEmptyEntry(side.id, index))
  );
  document.getElementById('resultArea').innerHTML = '';
  renderAll();
}

function characterOptions(entry) {
  const options = filteredCharacters(entry)
    .map((character) => `
      <option value="${character.id}" ${character.id === entry.charaId ? 'selected' : ''}>
        ${escapeHtml(character.name)}（${(character.speed || 0).toLocaleString()} / ${escapeHtml(character.attribute || '-')}）
      </option>
    `)
    .join('');
  const hiddenCurrent = entry.charaId && !filteredCharacters(entry).some((character) => character.id === entry.charaId)
    ? `<option value="${entry.charaId}" selected>${escapeHtml(getCharacter(entry.charaId)?.name || '選択中のキャラ')}</option>`
    : '';
  return `<option value="">-- キャラを選択 --</option>${hiddenCurrent}${options}`;
}

function runeButtons(entry, index) {
  return RUNE_TABLE.map((rune) => `
    <button
      type="button"
      class="rune-btn ${entry.rune[index] === rune.lv ? 'active' : ''}"
      onclick="setRune('${entry.side}', ${entry.slot}, ${index}, ${rune.lv})"
      title="${rune.label} (+${rune.speed})"
    >${rune.label}</button>
  `).join('');
}

function renderEntry(entry) {
  const character = getCharacter(entry.charaId);
  const speed = finalSpeed(entry);
  const base = character?.speed || 0;
  const sum = runeSum(entry);
  return `
    <div class="slot-card">
      <div class="slot-head">
        <span class="slot-num">${entry.slot + 1}</span>
        <select onchange="changeCharacter('${entry.side}', ${entry.slot}, this.value)">
          ${characterOptions(entry)}
        </select>
      </div>

      <div class="rune-panel">
        ${[0, 1, 2].map((index) => `
          <div class="rune-row">
            <span class="rune-label">ルーン${index + 1}</span>
            <div class="rune-buttons">${runeButtons(entry, index)}</div>
          </div>
        `).join('')}
      </div>

      <div class="slot-actions">
        <button class="btn" type="button" onclick="setAllRunes('${entry.side}', ${entry.slot}, 10)">全ルーンLv10</button>
        <button class="btn" type="button" onclick="setAllRunes('${entry.side}', ${entry.slot}, 0)">ルーンなし</button>
        <button class="btn danger" type="button" onclick="clearSlot('${entry.side}', ${entry.slot})">枠クリア</button>
      </div>

      <div class="speed-line">
        <span class="speed-breakdown">${character ? `基礎 ${base.toLocaleString()} / ルーン +${sum.toLocaleString()}` : '未選択'}</span>
        <span>最終スピード：<span class="speed-value">${formatSpeed(speed)}</span></span>
      </div>

      <label for="memo-${entry.side}-${entry.slot}" style="margin-top:8px">メモ</label>
      <textarea id="memo-${entry.side}-${entry.slot}" placeholder="役割、注意点、調整メモ" oninput="updateMemo('${entry.side}', ${entry.slot}, this.value)">${escapeHtml(entry.memo)}</textarea>
    </div>
  `;
}

function renderAll() {
  SIDES.forEach((side) => {
    const target = document.getElementById(side.target);
    target.innerHTML = entries
      .filter((entry) => entry.side === side.id)
      .map(renderEntry)
      .join('');
  });
}

function validEntries() {
  return entries
    .filter((entry) => entry.charaId)
    .map((entry) => {
      const character = getCharacter(entry.charaId);
      return {
        side: entry.side,
        sideLabel: SIDES.find((item) => item.id === entry.side)?.label || '',
        name: character?.name || '不明',
        base: character?.speed || 0,
        runeSum: runeSum(entry),
        finalSpeed: finalSpeed(entry) || 0,
        skill1: getSkillName(entry.charaId, 1),
        skill2: getSkillName(entry.charaId, 2),
        memo: entry.memo.trim(),
      };
    });
}

function resultRow(row, index, rows, skillName) {
  const diff = index < rows.length - 1 ? row.finalSpeed - rows[index + 1].finalSpeed : null;
  return `
    <div class="result-row">
      <div class="result-rank ${index === 0 ? 'rank1' : index === 1 ? 'rank2' : index === 2 ? 'rank3' : ''}">${index + 1}</div>
      <div class="side-chip ${row.side}">${row.sideLabel}</div>
      <div>
        <div class="result-name">${row.name}</div>
        <div class="result-skill">${skillName}</div>
        ${row.memo ? `<div class="result-memo">${escapeHtml(row.memo)}</div>` : ''}
      </div>
      <div class="result-speeds">
        <div class="result-speed">${row.finalSpeed.toLocaleString()}</div>
        ${diff !== null ? `<div class="result-diff">↓ 差 ${diff.toLocaleString()}</div>` : ''}
      </div>
    </div>
  `;
}

function calcOrder() {
  const rows = validEntries().sort((a, b) => b.finalSpeed - a.finalSpeed);
  if (rows.length === 0) {
    alert('キャラを1体以上選択してください。');
    return;
  }

  const memoRows = rows.filter((row) => row.memo);
  const memoHtml = memoRows.length
    ? `<div class="memo-box"><strong>メモ</strong><br>${memoRows.map((row) => `${escapeHtml(row.sideLabel)} ${escapeHtml(row.name)}: ${escapeHtml(row.memo)}`).join('<br>')}</div>`
    : '<div class="memo-box">メモなし</div>';

  const html = `
    <div class="result-tools">
      ${memoHtml}
      <button class="btn danger" type="button" onclick="clearAll()">全クリア</button>
    </div>
    <div class="caution">⚠️ 実際の行動順にはゲーム内の乱数が含まれます。スピード差が小さい場合は逆転することがあります。</div>
    <div class="turn-section">
      <div class="turn-title">1ターン目　スキル1使用</div>
      ${rows.map((row, index) => resultRow(row, index, rows, row.skill1)).join('')}
    </div>
    <div class="turn-section">
      <div class="turn-title">2ターン目　スキル2使用</div>
      ${rows.map((row, index) => resultRow(row, index, rows, row.skill2)).join('')}
    </div>
  `;

  document.getElementById('resultArea').innerHTML = html;
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

loadData();
</script>
</body>
</html>
