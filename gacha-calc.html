<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガチャ計算ツール｜メメントモリ攻略</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8aa64;
    --gold-dim: rgba(200,170,100,0.2);
    --gold-bg: rgba(200,170,100,0.1);
    --bg: #0d0a14;
    --bg2: #1a1025;
    --card: rgba(255,255,255,0.04);
    --text: #e8d9c0;
    --text-dim: #a08060;
    --text-dark: #604030;
    --green: #6ec97a;
    --green-bg: rgba(110,201,122,0.12);
    --green-border: rgba(110,201,122,0.3);
    --border: rgba(200,170,100,0.25);
  }

  body {
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }

  .container { max-width: 460px; margin: 0 auto; overflow-x: hidden; }

  .site-nav { margin-bottom: 18px; }
  .site-nav.bottom { margin: 18px 0 0; text-align: center; }
  .site-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--gold); font-size: 13px; font-weight: 700; text-decoration: none;
  }
  .site-back:hover { text-decoration: underline; }

  .header { text-align: center; margin-bottom: 28px; }
  .header-sub { font-size: 11px; letter-spacing: 4px; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; font-family: 'Noto Serif JP', serif; }
  .header h1 { font-size: 20px; font-weight: 700; color: #f0e0c0; font-family: 'Noto Serif JP', serif; line-height: 1.4; }
  .header-line { width: 48px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 10px auto 0; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px 20px; margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(200,170,100,0.08);
    max-width: 100%;
  }
  .section-title {
    font-size: 11px; letter-spacing: 2px; color: var(--gold);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--gold-dim); }

  label.field-label { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; display: block; margin-bottom: 4px; }
  .field-note { font-size: 10px; color: var(--text-dark); margin-bottom: 8px; }
  .field-group { margin-bottom: 18px; }

  .btn-group { display: flex; gap: 8px; }
  .btn-toggle {
    flex: 1; padding: 10px 8px; border-radius: 8px;
    border: 1px solid var(--gold-dim); background: rgba(255,255,255,0.03);
    color: #806040; font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  .btn-toggle.active { border-color: var(--gold); background: var(--gold-bg); color: #f0e0c0; }

  .rarity-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .btn-rarity, .btn-current {
    padding: 7px 11px; border-radius: 6px;
    border: 1px solid var(--gold-dim); background: rgba(255,255,255,0.03);
    color: #806040; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .btn-rarity.active, .btn-current.active { border-color: var(--gold); background: var(--gold-bg); color: #f0e0c0; }

  .extra-copies-row {
    margin-top: 12px; display: flex; align-items: center; gap: 8px;
    max-width: 100%; overflow: hidden;
  }
  .extra-copies-label { font-size: 12px; color: var(--text-dim); flex-shrink: 0; white-space: nowrap; }

  .num-input-row { display: flex; align-items: center; gap: 10px; max-width: 100%; }
  .num-input-row input { min-width: 0; }
  .btn-num {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1px solid var(--gold-dim); background: rgba(255,255,255,0.05);
    color: var(--gold); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-family: inherit; transition: background 0.15s;
  }
  .btn-num:hover { background: var(--gold-bg); }
  input[type="number"] {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--gold-dim);
    border-radius: 8px; color: #f0e0c0; font-size: 20px; text-align: center;
    padding: 8px 0; font-family: inherit; outline: none; -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ===== STEP2 ガチャ4択ボタン ===== */
  .gacha-mode-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn-gacha-mode {
    padding: 14px 8px;
    border-radius: 10px;
    border: 1px solid var(--gold-dim);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    text-align: center;
  }
  .btn-gacha-mode:hover { background: var(--gold-bg); border-color: var(--gold); }
  .btn-gacha-mode.active {
    border-color: var(--gold);
    background: var(--gold-bg);
    color: #f0e0c0;
    box-shadow: 0 0 0 1px var(--gold);
  }
  .btn-gacha-mode-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .btn-gacha-mode-cost { font-size: 10px; color: var(--text-dark); }
  .btn-gacha-mode.active .btn-gacha-mode-cost { color: var(--text-dim); }

  /* 入力グリッド */
  .input-grid-2 {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; max-width: 100%;
  }
  @media (max-width: 480px) { .input-grid-2 { grid-template-columns: 1fr; } }
  .input-col { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .input-col input[type="number"] { min-width: 0; }
  .input-col-title {
    font-size: 11px; color: var(--gold); letter-spacing: 1px;
    text-align: center; padding-bottom: 6px; border-bottom: 1px solid var(--gold-dim);
  }

  /* 結果カード */
  .result-card {
    background: var(--gold-bg); border: 1px solid var(--gold-dim);
    border-radius: 12px; padding: 20px 16px; margin-bottom: 16px;
  }
  .result-title { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-align: center; margin-bottom: 14px; }
  .result-row { display: flex; justify-content: space-around; margin-bottom: 14px; align-items: center; }
  .result-item { text-align: center; }
  .result-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .result-num { font-size: 32px; font-weight: 700; color: var(--gold); line-height: 1; }
  .result-unit { font-size: 13px; margin-left: 3px; }
  .result-divider { width: 1px; height: 48px; background: var(--gold-dim); }
  .result-note { font-size: 11px; color: var(--text-dark); text-align: center; line-height: 1.7; padding-top: 10px; border-top: 1px solid var(--gold-dim); }
  .badge-complete {
    background: var(--green-bg); border: 1px solid var(--green-border);
    border-radius: 8px; padding: 8px 12px; font-size: 13px; color: var(--green); text-align: center; margin-bottom: 8px;
  }

  /* ダイヤブロック */
  .diamond-block {
    background: rgba(100,120,200,0.08); border: 1px solid rgba(100,120,200,0.25);
    border-radius: 12px; padding: 16px; margin-bottom: 8px;
  }
  .diamond-block-red {
    background: rgba(200,100,100,0.08); border: 1px solid rgba(200,100,100,0.25);
    border-radius: 12px; padding: 16px; margin-bottom: 8px;
  }
  .diamond-label { font-size: 11px; color: #7080b0; margin-bottom: 6px; text-align: center; }
  .diamond-label-red { font-size: 11px; color: #b07070; margin-bottom: 6px; text-align: center; }

  /* 差額ボックス */
  .shortfall-box {
    margin-top: 12px; padding: 12px 14px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--gold-dim); border-radius: 10px;
  }
  .shortfall-row { display: flex; justify-content: space-around; gap: 8px; }
  .shortfall-item { text-align: center; }
  .shortfall-label { font-size: 10px; color: var(--text-dark); margin-bottom: 3px; }
  .shortfall-val { font-size: 18px; font-weight: 700; }

  /* 比較グリッド */
  .cmp-section-label {
    font-size: 11px; color: var(--text-dim); text-align: center;
    margin: 14px 0 6px; letter-spacing: 1px;
  }
  .cmp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .cmp-card {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 6px; text-align: center;
  }
  .cmp-card.hi-exp  { border-color: #a0b4f0; background: rgba(100,120,200,0.1); }
  .cmp-card.hi-ceil { border-color: #d09090; background: rgba(200,100,100,0.08); }
  .cmp-card.hi-both { border-color: var(--gold); background: var(--gold-bg); }
  .cmp-card-title { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; line-height: 1.4; }
  .cmp-val-exp  { font-size: 15px; font-weight: 700; color: #a0b4f0; line-height: 1.2; }
  .cmp-val-ceil { font-size: 15px; font-weight: 700; color: #d09090; line-height: 1.2; }
  .cmp-val-gold { font-size: 15px; font-weight: 700; color: var(--gold); line-height: 1.2; }
  .cmp-badge {
    display: inline-block; font-size: 8px; border-radius: 3px;
    padding: 1px 4px; margin-bottom: 3px; font-weight: 700;
  }
  .badge-exp  { background: #a0b4f0; color: #0d0a14; }
  .badge-ceil { background: #d09090; color: #0d0a14; }
  .badge-both { background: var(--gold); color: #1a1025; }
  .cmp-detail { font-size: 10px; color: var(--text-dark); margin-top: 3px; line-height: 1.5; }
  .cmp-breakdown {
    font-size: 10px; color: var(--text-dim); margin-top: 10px; padding: 8px 10px;
    background: rgba(255,255,255,0.02); border: 1px solid var(--gold-dim);
    border-radius: 8px; line-height: 1.9; text-align: left;
  }

  .footer-note { font-size: 10px; color: var(--text-dark); line-height: 1.8; text-align: center; margin-top: 8px; }

  /* クイック入力ボタン */
  .btn-quick-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .btn-quick {
    padding: 5px 10px; border-radius: 6px;
    border: 1px solid var(--gold-dim); background: rgba(255,255,255,0.03);
    color: var(--text-dim); font-size: 11px; cursor: pointer;
    font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .btn-quick:hover { background: var(--gold-bg); border-color: var(--gold); color: #f0e0c0; }

  .share-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn-share {
    flex: 1; padding: 12px 8px; border-radius: 10px;
    border: 1px solid var(--gold-dim); background: rgba(255,255,255,0.04);
    color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-share:hover { background: var(--gold-bg); border-color: var(--gold); }
  .btn-share:active { transform: scale(0.97); }
  .btn-share.copied { color: var(--green); border-color: var(--green-border); }
</style>

<body>
<div class="container">

  <nav class="site-nav" aria-label="サイト内ナビゲーション">
    <a class="site-back" href="/">← サイトトップへ戻る</a>
  </nav>

  <div class="header">
    <div class="header-sub">MementoMori</div>
    <h1>ガチャ計算ツール</h1>
    <div class="header-line"></div>
  </div>

  <!-- STEP1 -->
  <div class="card">
    <div class="section-title">STEP 1　キャラ設定</div>

    <div class="field-group">
      <label class="field-label">① キャラ属性</label>
      <div class="btn-group">
        <button class="btn-toggle active" onclick="setAttr('normal4',this)">藍・紅・翠・黄</button>
        <button class="btn-toggle" onclick="setAttr('lightDark',this)">天・冥</button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">② 現在のレアリティ</label>
      <div class="field-note">※ 素体未所持の場合は選択しない（未選択 = 0枚）</div>
      <div class="rarity-group" id="currentRarityGroup">
        <button class="btn-current" onclick="setCurrentRarity('SR',this)">SR</button>
        <button class="btn-current" onclick="setCurrentRarity('SRp',this)">SR+</button>
        <button class="btn-current" onclick="setCurrentRarity('SSR',this)">SSR</button>
        <button class="btn-current" onclick="setCurrentRarity('SSRp',this)">SSR+</button>
        <button class="btn-current" onclick="setCurrentRarity('UR',this)">UR</button>
        <button class="btn-current" onclick="setCurrentRarity('URp',this)">UR+</button>
        <button class="btn-current" onclick="setCurrentRarity('LR',this)">LR</button>
        <button class="btn-current" onclick="setCurrentRarity('LRp1',this)">LR+1</button>
        <button class="btn-current" onclick="setCurrentRarity('LRp2',this)">LR+2</button>
        <button class="btn-current" onclick="setCurrentRarity('LRp3',this)">LR+3</button>
        <button class="btn-current" onclick="setCurrentRarity('LRp4',this)">LR+4</button>
        <button class="btn-current" onclick="setCurrentRarity('LRp5',this)">LR+5</button>
      </div>
      <div class="extra-copies-row">
        <span class="extra-copies-label">余り同名カード（枚）</span>
        <button class="btn-num" onclick="changeExtra(-1)">−</button>
        <input type="number" id="extraInput" value="0" min="0" style="flex:1;min-width:0" oninput="onExtraInput(this.value)">
        <button class="btn-num" onclick="changeExtra(1)">＋</button>
      </div>
      <div id="ownedSummary" style="font-size:11px;color:var(--text-dim);margin-top:6px;text-align:right"></div>
    </div>

    <div class="field-group" style="margin-bottom:0">
      <label class="field-label">③ 目標レアリティ</label>
      <div class="rarity-group" id="rarityGroup">
        <button class="btn-rarity" onclick="setTarget('SR',this)">SR</button>
        <button class="btn-rarity" onclick="setTarget('SRp',this)">SR+</button>
        <button class="btn-rarity" onclick="setTarget('SSR',this)">SSR</button>
        <button class="btn-rarity" onclick="setTarget('SSRp',this)">SSR+</button>
        <button class="btn-rarity" onclick="setTarget('UR',this)">UR</button>
        <button class="btn-rarity" onclick="setTarget('URp',this)">UR+</button>
        <button class="btn-rarity active" onclick="setTarget('LR',this)">LR</button>
        <button class="btn-rarity" onclick="setTarget('LRp1',this)">LR+1</button>
        <button class="btn-rarity" onclick="setTarget('LRp2',this)">LR+2</button>
        <button class="btn-rarity" onclick="setTarget('LRp3',this)">LR+3</button>
        <button class="btn-rarity" onclick="setTarget('LRp4',this)">LR+4</button>
        <button class="btn-rarity" onclick="setTarget('LRp5',this)">LR+5</button>
      </div>
    </div>
  </div>

  <!-- 枚数結果 -->
  <div class="result-card" id="copyResult" style="display:none"></div>

  <!-- STEP2 -->
  <div class="card">
    <div class="section-title">STEP 2　使用するガチャを選択</div>
    <div class="gacha-mode-group">
      <button class="btn-gacha-mode active" id="mode-pickup" onclick="setMode('pickup')">
        <div class="btn-gacha-mode-name">ピックアップ</div>
        <div class="btn-gacha-mode-cost">300ダイヤ / 天井100回</div>
      </button>
      <button class="btn-gacha-mode" id="mode-destiny" onclick="setMode('destiny')">
        <div class="btn-gacha-mode-name">運命ガチャ</div>
        <div class="btn-gacha-mode-cost">500ダイヤ / 天井70回</div>
      </button>
      <button class="btn-gacha-mode" id="mode-star" onclick="setMode('star')">
        <div class="btn-gacha-mode-name">星の導き</div>
        <div class="btn-gacha-mode-cost">500ダイヤ / 天井70回</div>
      </button>
      <button class="btn-gacha-mode" id="mode-both" onclick="setMode('both')">
        <div class="btn-gacha-mode-name">PU ＋ 運命</div>
        <div class="btn-gacha-mode-cost">併用比較モード</div>
      </button>
    </div>
  </div>

  <!-- STEP3（動的レンダリング） -->
  <div id="step3Area"></div>

  <nav class="site-nav bottom" aria-label="サイト内ナビゲーション">
    <a class="site-back" href="/">← サイトトップへ戻る</a>
  </nav>

  <div class="footer-note">
    ※ 期待値は通常確率による概算です<br>
    ※ 運命・星の導きは57回目以降に確率が段階上昇します（暫定モデル）<br>
    ※ 通常4属性はSSR・UR進化時に同属性別キャラを素材に使用可能
  </div>

</div>
<script>
// ===== データ =====
const COPIES = {
  normal4:   { SR:1, SRp:2, SSR:2, SSRp:4, UR:4, URp:4, LR:8,  LRp1:10, LRp2:12, LRp3:14, LRp4:16, LRp5:20 },
  lightDark: { SR:1, SRp:2, SSR:4, SSRp:6, UR:8, URp:10, LR:14, LRp1:16, LRp2:18, LRp3:20, LRp4:22, LRp5:26 },
};
const GACHA = {
  pickup:  { normal4: { rate:0.0137,   cost:300, pity:100 }, lightDark: { rate:0.0126, cost:300, pity:100 } },
  destiny: { normal4: { rate:0.021712, cost:500, pity:70  }, lightDark: { rate:0.02,   cost:500, pity:70  } },
  star:    { normal4: { rate:0.021712, cost:500, pity:70  }, lightDark: { rate:0.02,   cost:500, pity:70  } },
};
const RARITY_LABELS = { SR:'SR', SRp:'SR+', SSR:'SSR', SSRp:'SSR+', UR:'UR', URp:'UR+', LR:'LR', LRp1:'LR+1', LRp2:'LR+2', LRp3:'LR+3', LRp4:'LR+4', LRp5:'LR+5' };
const GACHA_NAMES   = { pickup:'ピックアップ', destiny:'運命', star:'星の導き' };

// ===== 状態 =====
let state = {
  attr:'normal4', currentRarity:'none', extraCopies:0, target:'LR',
  mode:'pickup',          // 'pickup'|'destiny'|'star'|'both'
  pity:0, diamond:0, ticket:0,          // 単独用
  pityPickup:0, ticketPickup:0,         // 併用用
  pityDestiny:0, ticketDestiny:0,
  diamondCombined:0,
};

// ===== ヘルパー =====
function getOwned() {
  const base = state.currentRarity === 'none' ? 0 : COPIES[state.attr][state.currentRarity];
  return base + state.extraCopies;
}
function getRemaining() { return Math.max(0, COPIES[state.attr][state.target] - getOwned()); }
function soloKey() { return state.mode === 'both' ? 'pickup' : state.mode; }

// ===== STEP1 操作 =====
function setAttr(val, btn) {
  state.attr = val;
  document.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateOwnedSummary(); render();
}
function setTarget(val, btn) {
  state.target = val;
  document.querySelectorAll('.btn-rarity').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function setCurrentRarity(val, btn) {
  if (state.currentRarity === val) {
    state.currentRarity = 'none';
    document.querySelectorAll('.btn-current').forEach(b => b.classList.remove('active'));
  } else {
    state.currentRarity = val;
    document.querySelectorAll('.btn-current').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  updateOwnedSummary(); render();
}
function changeExtra(d) {
  state.extraCopies = Math.max(0, state.extraCopies + d);
  document.getElementById('extraInput').value = state.extraCopies;
  updateOwnedSummary(); render();
}
function onExtraInput(v) {
  state.extraCopies = Math.max(0, parseInt(v,10) || 0);
  updateOwnedSummary(); render();
}
function updateOwnedSummary() {
  const el = document.getElementById('ownedSummary');
  if (!el) return;
  const base  = state.currentRarity === 'none' ? 0 : COPIES[state.attr][state.currentRarity];
  const total = base + state.extraCopies;
  if (total === 0) { el.textContent = ''; return; }
  const lbl = state.currentRarity === 'none' ? '' : RARITY_LABELS[state.currentRarity] + '(' + base + '枚) ＋ ';
  el.textContent = `合計所持 ${lbl}余り${state.extraCopies}枚 ＝ ${total}枚`;
}

// ===== STEP2 ガチャ選択 =====
function setMode(mode) {
  state.mode = mode;
  ['pickup','destiny','star','both'].forEach(m => {
    const el = document.getElementById('mode-' + m);
    if (el) el.classList.toggle('active', m === mode);
  });
  render();
}

// ===== 単独 入力ハンドラ =====
function changePity(d) {

  const el = document.getElementById('pityInput'); if (el) el.value = state.pity;
  render();
}
function onPityInput(v)   { state.pity    = Math.max(0, parseInt(v,10)||0); render(); }
function changeTicket(d)  { state.ticket  = Math.max(0, state.ticket  + d); const el=document.getElementById('ticketInput');  if(el)el.value=state.ticket;  render(); }
function onTicketInput(v) { state.ticket  = Math.max(0, parseInt(v,10)||0); render(); }
function changeDiamond(d) { state.diamond = Math.max(0, state.diamond + d); const el=document.getElementById('diamondInput'); if(el)el.value=state.diamond; render(); }
function onDiamondInput(v){ state.diamond = Math.max(0, parseInt(v,10)||0); render(); }

// ===== 併用 入力ハンドラ =====

  const sk = w==='pickup'?'pityPickup':'pityDestiny';

  state[sk] = Math.max(0, Math.min(max, state[sk]+d));

}

function changeCmbTicket(w,d)  { const sk=w==='pickup'?'ticketPickup':'ticketDestiny'; state[sk]=Math.max(0,state[sk]+d); const el=document.getElementById('cmbTicket_'+w);if(el)el.value=state[sk]; render(); }
function onCmbTicketInput(w,v) { state[w==='pickup'?'ticketPickup':'ticketDestiny'] = Math.max(0,parseInt(v,10)||0); render(); }

// ===== 計算ロジック =====
function calcSolo(gKey, remaining, pity, diamond, ticket) {
  const g = GACHA[gKey][state.attr];
  const expRolls  = Math.ceil(remaining / g.rate);
  const remPity   = g.pity - pity;
  const maxRolls  = remPity + Math.max(0, remaining-1) * g.pity;
  const expDia    = expRolls * g.cost;
  const maxDia    = maxRolls * g.cost;
  const eff       = diamond + ticket * g.cost;
  return { g, expRolls, maxRolls, expDia, maxDia, remPity,
    sfExp:  Math.max(0, expDia - eff),
    sfCeil: Math.max(0, maxDia - eff) };
}

function ceilCost(needed, pityNow, tickets, gConf) {
  if (needed <= 0) return { rolls:0, diamond:0, ticketUsed:0 };
  const { pity, cost } = gConf;
  let rolls=0, cur=pityNow;
  for (let i=0;i<needed;i++) { rolls += pity-cur; cur=0; }
  const ticketUsed = Math.min(tickets, rolls);
  return { rolls, diamond:(rolls-ticketUsed)*cost, ticketUsed };
}
function expCost(needed, tickets, gConf) {
  if (needed <= 0) return { rolls:0, diamond:0, ticketUsed:0 };
  const { rate, cost } = gConf;
  const rolls = Math.ceil(needed / rate);
  const ticketUsed = Math.min(tickets, rolls);
  return { rolls, diamond:(rolls-ticketUsed)*cost, ticketUsed };
}

function calcBest(remaining) {
  const gP = GACHA.pickup[state.attr], gD = GACHA.destiny[state.attr];
  const can = remaining >= 2;
  const spE = expCost(remaining, state.ticketPickup,  gP);
  const sdE = expCost(remaining, state.ticketDestiny, gD);
  const spC = ceilCost(remaining, state.pityPickup,  state.ticketPickup,  gP);
  const sdC = ceilCost(remaining, state.pityDestiny, state.ticketDestiny, gD);
  let bestE=null, bestC=null, minE=Infinity, minC=Infinity;
  if (can) {
    for (let p=1; p<remaining; p++) {
      const d=remaining-p;
      const eP=expCost(p, state.ticketPickup,  gP), eD=expCost(d, state.ticketDestiny, gD);
      const t=eP.diamond+eD.diamond;
      if (t<minE) { minE=t; bestE={p,d,eP,eD,total:t,rolls:eP.rolls+eD.rolls}; }
      const cP=ceilCost(p, state.pityPickup,  state.ticketPickup,  gP);
      const cD=ceilCost(d, state.pityDestiny, state.ticketDestiny, gD);
      const tc=cP.diamond+cD.diamond;
      if (tc<minC) { minC=tc; bestC={p,d,cP,cD,total:tc,rolls:cP.rolls+cD.rolls}; }
    }
  }
  return { gP, gD, can, spE, sdE, spC, sdC, bestE, bestC };
}

  const inputHTML = `

      <div class="section-title">STEP 3　計算設定（ピックアップ × 運命）</div>
      <div class="input-grid-2">
        <div class="input-col">
          <div class="input-col-title">ピックアップ</div>

          </div>
          <label class="field-label" style="margin-top:8px">チケット枚数</label>
          <div class="num-input-row">
            <button class="btn-num" onclick="changeCmbTicket('pickup',-1)">−</button>
            <input type="number" id="cmbTicket_pickup" value="${state.ticketPickup}" min="0" oninput="onCmbTicketInput('pickup',this.value)">
            <button class="btn-num" onclick="changeCmbTicket('pickup',1)">＋</button>
          </div>
        </div>
        <div class="input-col">
          <div class="input-col-title">運命ガチャ</div>
          <label class="field-label">天井カウント</label>
          <div class="field-note">※ 0〜${gD.pity-1}（${gD.pity}回で確定）</div>
          <div class="num-input-row">
            <button class="btn-num" onclick="changeCmbPity('destiny',-1)">−</button>
            <input type="number" id="cmbPity_destiny" value="${state.pityDestiny}" min="0" oninput="onCmbPityInput('destiny',this.value)">
            <button class="btn-num" onclick="changeCmbPity('destiny',1)">＋</button>
          </div>
          <div class="btn-quick-row">
            <button class="btn-quick" onclick="changeCmbPity('destiny',10)">+10</button>
            <button class="btn-quick" onclick="changeCmbPity('destiny',-10)">−10</button>
          </div>
          <label class="field-label" style="margin-top:8px">チケット枚数</label>
          <div class="num-input-row">
            <button class="btn-num" onclick="changeCmbTicket('destiny',-1)">−</button>
            <input type="number" id="cmbTicket_destiny" value="${state.ticketDestiny}" min="0" oninput="onCmbTicketInput('destiny',this.value)">
            <button class="btn-num" onclick="changeCmbTicket('destiny',1)">＋</button>
          </div>
        </div>
      </div>
      <div class="field-group" style="margin-bottom:0">
        <label class="field-label">ダイヤ所持数（任意）</label>
        <div class="num-input-row">
          <button class="btn-num" onclick="changeCmbDiamond(-100)">−</button>
          <input type="number" id="cmbDiamond" value="${state.diamondCombined}" min="0" oninput="onCmbDiamondInput(this.value)">

        </div>
        <div class="btn-quick-row">
          <button class="btn-quick" onclick="changeCmbDiamond(100)">+100</button>
          <button class="btn-quick" onclick="changeCmbDiamond(1000)">+1,000</button>
          <button class="btn-quick" onclick="changeCmbDiamond(10000)">+10,000</button>
          <button class="btn-quick" onclick="changeCmbDiamond(-1000)">−1,000</button>
        </div>
      </div>
    </div>`;
  if (rem === 0) return inputHTML;

  const c = calcBest(rem);
  // バッジ用配列 [PU, 運命, 併用]
  const eVals = [c.spE.diamond, c.sdE.diamond, c.can ? c.bestE.total : Infinity];
  const cVals = [c.spC.diamond, c.sdC.diamond, c.can ? c.bestC.total : Infinity];
  const minE = Math.min(...eVals), minC = Math.min(...cVals);

  function cardCls(i) {
    const be=eVals[i]===minE, bc=cVals[i]===minC;
    if (be&&bc) return 'cmp-card hi-both';
    if (be)     return 'cmp-card hi-exp';
    if (bc)     return 'cmp-card hi-ceil';
    return 'cmp-card';
  }
  function badge(i) {
    const be=eVals[i]===minE, bc=cVals[i]===minC;
    if (be&&bc) return '<div><span class="cmp-badge badge-both">期待値・天井 最安</span></div>';
    let s='';
    if (be) s+='<span class="cmp-badge badge-exp">期待値 最安</span> ';
    if (bc) s+='<span class="cmp-badge badge-ceil">天井 最安</span>';
    return s ? `<div>${s}</div>` : '';
  }

  // 併用列
  const col2 = c.can ? `
    <div class="${cardCls(2)}">
      <div class="cmp-card-title">最安<br>併用</div>
      ${badge(2)}
      <div class="cmp-val-exp">${c.bestE.total.toLocaleString()}<span style="font-size:9px">💎</span></div>
      <div class="cmp-val-ceil">${c.bestC.total.toLocaleString()}<span style="font-size:9px">💎</span></div>

    </div>` : `
    <div class="cmp-card" style="opacity:0.38">
      <div class="cmp-card-title">併用</div>
      <div style="font-size:10px;color:var(--text-dark);margin-top:10px;line-height:1.7">1枚のため<br>不可</div>
    </div>`;

  // 差額
  const eff = state.diamondCombined;
  let sfHTML = '';
  if (eff > 0) {
    const minEf = Math.min(...eVals.filter(v=>v<Infinity));
    const minCf = Math.min(...cVals.filter(v=>v<Infinity));
    const sfe = Math.max(0, minEf - eff), sfc = Math.max(0, minCf - eff);
    sfHTML = `
      <div class="shortfall-box" style="margin-top:10px">
        <div class="result-label" style="text-align:center;margin-bottom:8px">所持ダイヤ ${eff.toLocaleString()}💎 との差（最安パターン）</div>
        <div class="shortfall-row">
          <div class="shortfall-item">
            <div class="shortfall-label">期待値で</div>
            <div class="shortfall-val" style="color:${sfe===0?'var(--green)':'#e09060'}">${sfe===0?'足りる':'▲'+sfe.toLocaleString()+'💎'}</div>
          </div>
          <div style="width:1px;background:var(--gold-dim)"></div>
          <div class="shortfall-item">
            <div class="shortfall-label">天井保証でも</div>
            <div class="shortfall-val" style="color:${sfc===0?'var(--green)':'#e06060'}">${sfc===0?'足りる':'▲'+sfc.toLocaleString()+'💎'}</div>
          </div>
        </div>
      </div>`;
  }

  // 内訳
  const bdHTML = c.can ? `
    <div class="cmp-breakdown">
      <strong style="color:#a0b4f0">期待値 最安</strong>：PU <strong>${c.bestE.p}枚</strong>（${c.bestE.eP.rolls}回・${c.bestE.eP.diamond.toLocaleString()}💎${tn(c.bestE.eP.ticketUsed)}）＋ 運命 <strong>${c.bestE.d}枚</strong>（${c.bestE.eD.rolls}回・${c.bestE.eD.diamond.toLocaleString()}💎${tn(c.bestE.eD.ticketUsed)}）<br>
      <strong style="color:#d09090">天井 最安</strong>：PU <strong>${c.bestC.p}枚</strong>（${c.bestC.cP.rolls}回・${c.bestC.cP.diamond.toLocaleString()}💎${tn(c.bestC.cP.ticketUsed)}）＋ 運命 <strong>${c.bestC.d}枚</strong>（${c.bestC.cD.rolls}回・${c.bestC.cD.diamond.toLocaleString()}💎${tn(c.bestC.cD.ticketUsed)}）
    </div>` : '';

  return inputHTML + `
    <div class="card" id="resultCard">
      <div class="section-title">計算結果　ピックアップ × 運命 比較</div>
      <div class="cmp-grid">
        <div class="${cardCls(0)}">
          <div class="cmp-card-title">PUのみ</div>
          ${badge(0)}
          <div class="cmp-val-exp">${c.spE.diamond.toLocaleString()}<span style="font-size:9px">💎</span></div>
          <div class="cmp-val-ceil">${c.spC.diamond.toLocaleString()}<span style="font-size:9px">💎</span></div>
          <div class="cmp-detail">${c.spE.rolls}回（期待）${tn(c.spE.ticketUsed)}<br>${c.spC.rolls}回（天井）${tn(c.spC.ticketUsed)}</div>
        </div>
        <div class="${cardCls(1)}">
          <div class="cmp-card-title">運命のみ</div>
          ${badge(1)}
          <div class="cmp-val-exp">${c.sdE.diamond.toLocaleString()}<span style="font-size:9px">💎</span></div>
          <div class="cmp-val-ceil">${c.sdC.diamond.toLocaleString()}<span style="font-size:9px">💎</span></div>
          <div class="cmp-detail">${c.sdE.rolls}回（期待）${tn(c.sdE.ticketUsed)}<br>${c.sdC.rolls}回（天井）${tn(c.sdC.ticketUsed)}</div>
        </div>
        ${col2}

      <div class="footer-note" style="margin-top:4px;margin-bottom:4px">
        <span style="color:#a0b4f0">■</span> 期待値　<span style="color:#d09090">■</span> 天井保証
      </div>
      ${bdHTML}
      ${sfHTML}
      <div class="footer-note" style="margin-top:10px">
        ※ PU天井 ${gP.pity}回 / 運命天井 ${gD.pity}回<br>
        ※ 期待値は通常確率による概算です
      </div>
      <div class="share-row">
        <button class="btn-share" id="btnCopy" onclick="copyResult()">📋 テキストコピー</button>
        <button class="btn-share" id="btnSave" onclick="saveImage('resultCard')">🖼️ 画像を保存</button>
      </div>
    </div>`;
}

  const rem = getRemaining();
  const attr = state.attr==='normal4'?'通常4属性':'天・冥';
  let t = `【メメモリ ガチャ計算】\n属性：${attr} / 目標：${RARITY_LABELS[state.target]}\n必要枚数：あと${rem}枚\n`;
  if (state.mode === 'both') {
    const c = calcBest(rem);
    t += `モード：ピックアップ × 運命 併用比較\n`;
    t += `PUのみ：期待値 ${c.spE.diamond.toLocaleString()}💎 / 天井 ${c.spC.diamond.toLocaleString()}💎\n`;
    t += `運命のみ：期待値 ${c.sdE.diamond.toLocaleString()}💎 / 天井 ${c.sdC.diamond.toLocaleString()}💎\n`;
    if (c.can) {
      t += `最安併用（期待値）：${c.bestE.total.toLocaleString()}💎（PU${c.bestE.p}枚＋運命${c.bestE.d}枚）\n`;
      t += `最安併用（天井）：${c.bestC.total.toLocaleString()}💎（PU${c.bestC.p}枚＋運命${c.bestC.d}枚）\n`;
    }
  } else {
    const gKey = soloKey();
    const r = calcSolo(gKey, rem, state.pity, state.diamond, state.ticket);
    t += `ガチャ：${GACHA_NAMES[gKey]}\n`;
    t += `期待値：${r.expDia.toLocaleString()}💎（${r.expRolls}回）\n`;
    t += `天井保証：${r.maxDia.toLocaleString()}💎（${r.maxRolls}回）\n`;
    if (state.diamond>0||state.ticket>0) {
      t += `所持：${state.diamond.toLocaleString()}💎`;
      if (state.ticket>0) t += ` ＋ チケット${state.ticket}枚`;
      t += `\n`;
      t += r.sfExp===0  ? `→ 期待値で足りる✅\n`      : `→ 期待値で▲${r.sfExp.toLocaleString()}💎 不足\n`;
      t += r.sfCeil===0 ? `→ 天井保証でも足りる✅\n` : `→ 天井保証で▲${r.sfCeil.toLocaleString()}💎 不足\n`;
    }
  }
  t += `\n計算ツール → https://memento.musoudc.com/gacha-calc.html\n#メメントモリ #メメモリ`;
  return t;
}
function copyResult() {
  const text = buildShareText();
  function fb(t) {
    const ta=document.createElement('textarea'); ta.value=t;
    ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{const ok=document.execCommand('copy');document.body.removeChild(ta);return ok;}
    catch(e){document.body.removeChild(ta);return false;}
  }
  function ok() {
    const b=document.getElementById('btnCopy'); if(!b)return;
    b.textContent='✅ コピーしました'; b.classList.add('copied');
    setTimeout(()=>{b.textContent='📋 テキストコピー';b.classList.remove('copied');},2000);
  }
  if (navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok).catch(()=>{if(fb(text))ok();else showModal(text);});
  else { if(fb(text))ok(); else showModal(text); }
}
function showModal(text) {
  const o=document.createElement('div');
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
  o.innerHTML=`<div style="background:#1a1025;border:1px solid #c8aa64;border-radius:12px;padding:20px;width:100%;max-width:400px;">
    <div style="font-size:12px;color:#a08060;margin-bottom:8px;">長押しして「すべて選択→コピー」してください</div>
    <textarea readonly style="width:100%;height:200px;background:#0d0a14;color:#e8d9c0;border:1px solid rgba(200,170,100,0.3);border-radius:8px;padding:10px;font-size:12px;font-family:inherit;resize:none;">${text}</textarea>
    <button onclick="this.closest('div').parentElement.remove()" style="margin-top:12px;width:100%;padding:10px;background:rgba(200,170,100,0.15);border:1px solid #c8aa64;border-radius:8px;color:#f0e0c0;font-family:inherit;cursor:pointer;">閉じる</button>
  </div>`;
  document.body.appendChild(o); o.querySelector('textarea').select();
}
function saveImage(cardId) {
  const btn=document.getElementById('btnSave');
  if(btn){btn.textContent='⏳ 生成中...';btn.disabled=true;}
  const t=document.getElementById(cardId);
  if(!t){if(btn){btn.textContent='🖼️ 画像を保存';btn.disabled=false;}return;}
  html2canvas(t,{backgroundColor:'#1a1025',scale:2,useCORS:true,logging:false})
    .then(c=>{
      const l=document.createElement('a');
      l.download='mementomori-gacha-calc.png'; l.href=c.toDataURL('image/png'); l.click();
      if(btn){btn.textContent='🖼️ 画像を保存';btn.disabled=false;}
    }).catch(()=>{
      alert('画像の生成に失敗しました。');
      if(btn){btn.textContent='🖼️ 画像を保存';btn.disabled=false;}
    });
}

render();
